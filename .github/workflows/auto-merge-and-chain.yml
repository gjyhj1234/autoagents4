#
# PR 所有检查通过后：
#   1) 自动合并 PR（squash）
#   2) 关闭 PR 所关联的 Issue
#   3) 把 Issue body 里声明的 "下一个子任务" 打上 status:ready 标签，
#      让 Copilot 编码代理再次接手（在该仓库启用 Copilot coding agent 时）
#
name: auto-merge-and-chain

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_run:
    workflows: ["copilot-task-demo"]
    types: [completed]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Find PR related to this workflow_run
        id: findpr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.info('workflow_run 没有关联 PR，直接结束。');
              return;
            }
            const pr = prs[0];
            core.setOutput('number', pr.number);

      - name: Merge PR (squash)
        if: steps.findpr.outputs.number
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = Number('${{ steps.findpr.outputs.number }}');

            // If the PR is still a draft, convert it to ready-for-review first
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: pr_number,
            });
            if (pr.draft) {
              await github.graphql(`
                mutation($id: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                    pullRequest { isDraft }
                  }
                }
              `, { id: pr.node_id });
              core.info(`PR #${pr_number} converted from draft to ready-for-review ✅`);
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: pr_number,
              merge_method: 'squash'
            });
            core.info(`PR #${pr_number} merged ✅`);

      - name: Close linked issue & trigger next
        if: steps.findpr.outputs.number
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = Number('${{ steps.findpr.outputs.number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: pr_number
            });
            const body = (pr.body || '') + ' ' + (pr.title || '');

            // 1) 解析并关闭 "Closes #N" / "Fixes #N"
            const closeRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issues = [...body.matchAll(closeRegex)].map(m => Number(m[1]));
            for (const n of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: n, state: 'closed'
              });
              core.info(`Issue #${n} closed ✅`);

              // 2) 读取该 Issue body，看有没有 "下一个子任务 Issue 编号"
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: n
              });
              const next = (issue.body || '').match(/#(\d+)/g) || [];
              // 过滤掉自身
              const nextNum = next.map(x => Number(x.slice(1))).find(x => x !== n);
              if (nextNum) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: nextNum, labels: ['status:ready']
                });
                core.info(`已触发下一个子任务 Issue #${nextNum} (打上 status:ready 标签)`);
              }
            }
